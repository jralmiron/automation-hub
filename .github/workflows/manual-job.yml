name: Manual automation job

on:
  workflow_dispatch:
    inputs:
      job:
        description: "daily | telegram | trigger | supabase | gmail_inbox | calendar_agenda | gmail_organize | morning_routine | urgent_emails | tomorrow_meetings | purchase_tracking | financial_summary | newsletter_cleanup | followup_24h | followup_48h | night_digest | briefing | focus_mode"
        required: true
        default: "daily"
      text:
        description: "Texto opcional para telegram"
        required: false
        default: "Mensaje manual desde GitHub Actions"

jobs:
  manual:
    runs-on: ubuntu-latest
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      TRIGGER_API_KEY: ${{ secrets.TRIGGER_API_KEY }}
      TRIGGER_API_URL: ${{ secrets.TRIGGER_API_URL }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      SUPABASE_SCHEMA: ${{ secrets.SUPABASE_SCHEMA }}
      GMAIL_SUMMARY_TO: ${{ secrets.GMAIL_SUMMARY_TO }}
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
      GOOGLE_CALENDAR_ID: ${{ secrets.GOOGLE_CALENDAR_ID }}
      GOOGLE_TIMEZONE: ${{ secrets.GOOGLE_TIMEZONE }}
      OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
      AEMET_API_KEY: ${{ secrets.AEMET_API_KEY }}
      VIP_EMAILS: ${{ secrets.VIP_EMAILS }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npm run job:manual -- "${{ inputs.job }}" "${{ inputs.text }}"
