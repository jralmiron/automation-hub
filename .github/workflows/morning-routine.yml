name: Morning routine

on:
  schedule:
    - cron: "5 7 * * *"
    - cron: "5 8 * * *"
  workflow_dispatch:

jobs:
  morning:
    runs-on: ubuntu-latest
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
      GOOGLE_CALENDAR_ID: ${{ secrets.GOOGLE_CALENDAR_ID }}
      GOOGLE_TIMEZONE: ${{ secrets.GOOGLE_TIMEZONE }}
      OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
      AEMET_API_KEY: ${{ secrets.AEMET_API_KEY }}
      VIP_EMAILS: ${{ secrets.VIP_EMAILS }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npm run job:morning
      - run: npm run job:manual -- briefing "briefing diario"
      - run: npm run job:manual -- followup_24h "seguimiento 24h"
      - run: npm run job:manual -- newsletter_cleanup "limpieza newsletters"
      - run: npm run job:manual -- focus_mode "modo foco"
